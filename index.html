<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Boltoog AI | Premium Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030303;
  --panel: rgba(18, 18, 20, 0.7);
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #a78bfa;
  --accent-glow: rgba(167, 139, 250, 0.4);
  --deep: #6d28d9;
  --text: #f4f4f5;
  --muted: #71717a;
  --sub: #a1a1aa;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body { 
  height: 100%; width: 100%; background: var(--bg); color: var(--text); 
  font-family: 'Outfit', sans-serif; overflow: hidden; position: fixed;
}

/* AMBIENT BACKGROUND */
.ambient-bg {
  position: fixed; inset: 0; z-index: -1; overflow: hidden;
  background: radial-gradient(circle at 0% 0%, rgba(109, 40, 217, 0.15) 0%, transparent 40%),
              radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
}
.ambient-glow {
  position: absolute; width: 400px; height: 400px; background: var(--deep);
  filter: blur(150px); border-radius: 50%; opacity: 0.2;
  animation: float 20s infinite alternate;
}
@keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 100px); } }

#app-root { display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; position: relative; }

/* HEADER */
.hdr {
  flex: 0 0 75px; padding-top: env(safe-area-inset-top, 0px);
  background: var(--panel); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between;
  padding-left: 20px; padding-right: 20px; z-index: 100;
}
.logo-area { display: flex; align-items: center; gap: 15px; }
.logo-sq { 
  width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--deep));
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 25px var(--accent-glow); position: relative; overflow: hidden;
}
.logo-sq::after { content:''; position:absolute; inset:0; background: linear-gradient(to bottom right, rgba(255,255,255,0.4), transparent); }
.brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.8px; background: linear-gradient(to right, #fff, var(--sub)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* SIDEBAR - ULTRA PREMIUM */
.sb {
  position: fixed; top: 0; left: 0; bottom: 0; width: 320px;
  background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(50px); border-right: 1px solid var(--glass-border);
  z-index: 500; transform: translateX(-100%); transition: transform 0.5s var(--ease);
  display: flex; flex-direction: column; padding: 25px;
}
.sb.open { transform: translateX(0); box-shadow: 40px 0 100px rgba(0,0,0,0.9); }
.new-chat-btn {
  width: 100%; padding: 14px; background: var(--deep); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; color: #fff; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 10px 30px rgba(109, 40, 217, 0.3); transition: 0.3s; margin-bottom: 25px;
}
.new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(109, 40, 217, 0.4); }

.search-wrap { 
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
  padding: 10px 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 25px;
}
.search-wrap input { background: transparent; border: none; outline: none; color: #fff; font-size: 14px; flex: 1; }

.sb-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
.sb-item {
  padding: 14px; border-radius: 14px; display: flex; align-items: center; gap: 12px;
  color: var(--sub); font-size: 14.5px; cursor: pointer; transition: 0.2s;
  border: 1px solid transparent;
}
.sb-item:hover { background: var(--glass); color: #fff; border-color: var(--glass-border); }
.sb-item.active { background: rgba(167, 139, 250, 0.1); color: var(--accent); border-color: rgba(167, 139, 250, 0.2); }
.sb-item-icon { width: 34px; height: 34px; background: var(--panel); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

/* CHAT FLOW */
.chat-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 30px; -webkit-overflow-scrolling: touch; }
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

.msg-card { display: flex; flex-direction: column; animation: reveal 0.6s var(--ease); max-width: 850px; width: 100%; margin: 0 auto; }
@keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.msg-info { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.msg-info::after { content:''; flex:1; height: 1px; background: var(--glass-border); }

.bubble { 
  padding: 18px 24px; font-size: 16px; line-height: 1.7; border-radius: 22px; 
  position: relative; border: 1px solid var(--glass-border);
}
.bubble.user { 
  align-self: flex-end; background: linear-gradient(135deg, var(--deep), #4c1d95); 
  color: #fff; border: none; box-shadow: 0 15px 45px rgba(109, 40, 217, 0.25);
  border-bottom-right-radius: 4px;
}
.bubble.ai { 
  align-self: flex-start; background: var(--panel); 
  backdrop-filter: blur(10px); border-bottom-left-radius: 4px;
}

/* INPUT DOCK */
.dock-wrap { 
  flex: 0 0 auto; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  z-index: 100; display: flex; justify-content: center;
}
.input-dock {
  width: 100%; max-width: 800px; background: var(--panel); backdrop-filter: blur(30px);
  border: 1px solid var(--glass-border); border-radius: 28px; padding: 8px 8px 8px 20px;
  display: flex; align-items: flex-end; gap: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transition: 0.3s var(--ease);
}
.input-dock:focus-within { border-color: var(--accent); box-shadow: 0 0 0 5px rgba(167, 139, 250, 0.15); }
#msg { 
  flex: 1; background: transparent; border: none; outline: none; color: #fff; 
  font-size: 16px; padding: 12px 0; min-height: 24px; max-height: 180px; 
  resize: none; font-family: inherit; line-height: 1.5;
}
#sendBtn { 
  width: 48px; height: 48px; border-radius: 20px; background: var(--deep);
  border: none; color: #fff; cursor: pointer; transition: 0.3s var(--ease);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 8px 20px rgba(109, 40, 217, 0.3); transform: scale(0.9); opacity: 0.5;
}
#sendBtn.active { transform: scale(1); opacity: 1; }
#sendBtn:hover { transform: scale(1.05); }

/* MISC */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 450; display: none; backdrop-filter: blur(10px); }
.overlay.open { display: block; }

.typing { display: flex; gap: 6px; padding: 15px 25px; background: var(--panel); border-radius: 20px; align-self: flex-start; border: 1px solid var(--glass-border); }
.typing div { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite; }
.typing div:nth-child(2) { animation-delay: 0.2s; }
.typing div:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

#splash { 
  position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="ambient-bg"><div class="ambient-glow"></div></div>

<div id="splash">
  <div class="logo-sq" style="width:80px; height:80px; font-size:40px;">⚡</div>
  <h1 style="margin-top:30px; letter-spacing:8px; font-size:12px; font-weight:700; color:var(--muted)">BOLTOOG PREMIUM</h1>
</div>

<div id="app-root">
  <div class="overlay" id="overlay"></div>
  
  <aside class="sb" id="sb">
    <div class="logo-area" style="margin-bottom:30px;">
      <div class="logo-sq" style="width:34px; height:34px; font-size:18px;">⚡</div>
      <span class="brand-name" style="font-size:18px;">Boltoog AI</span>
    </div>
    
    <button class="new-chat-btn" id="newBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New Conversation
    </button>
    
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="historySearch" placeholder="Search history...">
    </div>
    
    <div class="sb-list" id="sbList"></div>
    
    <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--glass-border); display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--glass); border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid var(--glass-border); font-size:18px;">👤</div>
        <div style="display:flex; flex-direction:column;">
          <span id="uName" style="font-size:14px; font-weight:600;">Guest</span>
          <span style="font-size:11px; color:var(--muted);">Pro Plan</span>
        </div>
      </div>
      <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </aside>

  <header class="hdr">
    <div class="logo-area">
      <button class="logo-sq" id="menuBtn" style="border:none; cursor:pointer; display:flex; flex-direction:column; gap:3px; background:var(--panel);">
        <div style="width:18px; height:2px; background:#fff; border-radius:1px;"></div>
        <div style="width:18px; height:2px; background:#fff; border-radius:1px;"></div>
        <div style="width:18px; height:2px; background:#fff; border-radius:1px;"></div>
      </button>
      <span class="brand-name">Boltoog AI</span>
    </div>
    <div id="activeChatTitle" style="color:var(--muted); font-size:13px; font-weight:500; opacity:0.6;"></div>
  </header>

  <main class="chat-area" id="chat">
    <div id="empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:25px;">
      <div style="width:100px; height:100px; background:var(--glass); border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:50px; border:1px solid var(--glass-border);">✨</div>
      <div>
        <h2 style="font-size:32px; font-weight:700; margin-bottom:10px;">How can I help today?</h2>
        <p style="color:var(--muted); max-width:320px; line-height:1.6;">Experience the next generation of AI assistance. Ask me anything.</p>
      </div>
    </div>
  </main>

  <div class="dock-wrap">
    <div class="input-dock">
      <textarea id="msg" rows="1" placeholder="Type a message..."></textarea>
      <button id="sendBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const sc = supabase.createClient(S_URL, S_KEY);

let session = null, currId = null, history = [], allChats = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const sbList = document.getElementById('sbList');
const sidebar = document.getElementById('sb');
const overlay = document.getElementById('overlay');
const splash = document.getElementById('splash');

// NUCLEAR KEYBOARD FIX
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app-root').style.height = window.visualViewport.height + 'px';
    window.scrollTo(0,0);
    chatEl.scrollTop = chatEl.scrollHeight;
  });
}

async function init() {
  const guest = localStorage.getItem('boltoog_guest') === 'true';
  const { data } = await sc.auth.getSession();
  if (!data.session && !guest) { window.location.href = '/login'; return; }
  
  if (guest) {
    session = { access_token: 'guest' };
    document.getElementById('uName').textContent = 'Guest';
    sbList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:13px">Login to unlock history</div>';
  } else {
    session = data.session;
    document.getElementById('uName').textContent = session.user.user_metadata.full_name || 'User';
    await loadH();
  }
  setTimeout(() => splash.style.display='none', 1000);
}

async function loadH() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${session.access_token}` } });
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    allChats = d.chats || [];
    renderH(allChats);
  } catch(e) {}
}

function renderH(chats) {
  sbList.innerHTML = '';
  if (!chats.length) return;
  
  const groups = { Today: [], Yesterday: [], Previous: [] };
  const now = new Date();
  chats.forEach(c => {
    const d = new Date(c.created_at);
    const diff = (now - d) / 86400000;
    if (diff < 1) groups.Today.push(c);
    else if (diff < 2) groups.Yesterday.push(c);
    else groups.Previous.push(c);
  });

  Object.entries(groups).forEach(([name, items]) => {
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.style = 'font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; margin:15px 10px 8px; letter-spacing:1px;';
    lbl.textContent = name;
    sbList.appendChild(lbl);
    items.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sb-item' + (c.id === currId ? ' active' : '');
      el.innerHTML = `
        <div class="sb-item-icon">💬</div>
        <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.title || 'Chat'}</span>
        <button style="background:none; border:none; color:var(--muted); cursor:pointer;" onclick="event.stopPropagation();del('${c.id}')">⋮</button>`;
      el.onclick = () => open(c.id);
      sbList.appendChild(el);
    });
  });
}

async function open(id) {
  currId = id; history = [];
  chatEl.innerHTML = '<div style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted);">Encrypting connection...</div>';
  sidebar.classList.remove('open'); overlay.classList.remove('open');
  const r = await fetch(`/api/chat-details?id=${id}`, { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  chatEl.innerHTML = '';
  (d.messages || []).forEach(m => {
    addB(m.role === 'user' ? 'user' : 'ai', m.content);
    history.push({ role: m.role, parts: [{ text: m.content }] });
  });
  const c = allChats.find(x => x.id === id);
  if (c) document.getElementById('activeChatTitle').textContent = c.title;
  chatEl.scrollTop = chatEl.scrollHeight;
  renderH(allChats);
}

async function del(id) {
  if (!confirm('Delete chat?')) return;
  await fetch(`/api/delete-chat?id=${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${session.access_token}` } });
  if (currId === id) location.reload(); else loadH();
}

function addB(type, text) {
  const g = document.createElement('div');
  g.className = 'msg-card';
  g.innerHTML = `<div class="msg-info"><span>${type==='user'?'Owner':'Assistant'}</span></div><div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(g);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function logout() { 
  localStorage.removeItem('boltoog_guest');
  await sc.auth.signOut(); 
  window.location.href = '/login'; 
}

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  if (document.getElementById('empty-state')) document.getElementById('empty-state').remove();
  addB('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('active');
  busy = true;
  const dot = document.createElement('div');
  dot.className = 'typing';
  dot.innerHTML = '<div></div><div></div><div></div>';
  chatEl.appendChild(dot);
  chatEl.scrollTop = chatEl.scrollHeight;
  msgEl.focus();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: history, chatId: currId })
    });
    const d = await r.json();
    dot.remove();
    if (d.response) {
      addB('ai', d.response);
      history.push({ role: 'user', parts: [{ text: val }] });
      history.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currId) { currId = d.chatId; loadH(); }
    } else {
      alert('Error: ' + d.error);
    }
  } catch (e) { dot.remove(); addB('ai', 'Lost link.'); } finally { busy = false; chatEl.scrollTop = chatEl.scrollHeight; msgEl.focus(); }
}

msgEl.oninput = () => { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 180) + 'px'; sendBtn.classList.toggle('active', msgEl.value.trim().length > 0); };
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
sendBtn.onmousedown = e => e.preventDefault();
sendBtn.onclick = send;

document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('open'); overlay.classList.add('open'); };
document.getElementById('newBtn').onclick = () => { location.reload(); };
document.getElementById('logoutBtn').onclick = logout;
overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); };
document.getElementById('historySearch').oninput = (e) => {
  const q = e.target.value.toLowerCase();
  renderH(allChats.filter(c => (c.title||'').toLowerCase().includes(q)));
};

init();
</script>
</body>
</html>
