<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Boltoog AI | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030303;
  --card: rgba(20, 20, 22, 0.8);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #a78bfa;
  --text: #ffffff;
  --sub: #a1a1aa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  height: 100dvh; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.ambient {
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 50%, rgba(109, 40, 217, 0.15), transparent 70%);
}
.card {
  width: 90%; max-width: 380px; background: var(--card); backdrop-filter: blur(40px);
  border: 1px solid var(--border); border-radius: 28px; padding: 30px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 20px;
}
.logo { width: 50px; height: 50px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto; box-shadow: 0 0 20px rgba(167, 139, 250, 0.3); }
.header { text-align: center; }
.header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.header p { color: var(--sub); font-size: 14px; }

form { display: flex; flex-direction: column; gap: 15px; }
.group { display: flex; flex-direction: column; gap: 6px; }
.label { font-size: 13px; font-weight: 600; color: var(--sub); margin-left: 4px; }
input { 
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
  border-radius: 14px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none;
  transition: 0.2s;
}
input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
.btn { 
  background: var(--accent); color: #000; border: none; border-radius: 14px; 
  padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s;
  margin-top: 5px;
}
.btn:active { transform: scale(0.98); }

.footer { text-align: center; font-size: 13px; color: var(--sub); margin-top: 5px; }
.footer a { color: var(--accent); text-decoration: none; font-weight: 600; }

.skip-btn {
  background: none; border: 1px solid var(--border); color: var(--sub);
  border-radius: 14px; padding: 12px; font-size: 13px; cursor: pointer;
  transition: 0.2s;
}
.skip-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

#error { color: #f87171; font-size: 12px; text-align: center; display: none; }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="card">
  <div class="logo">⚡</div>
  <div class="header">
    <h1 id="title">Welcome</h1>
    <p id="subtitle">Sign in to Boltoog AI</p>
  </div>

  <div id="error"></div>

  <form id="authForm">
    <div class="group">
      <label class="label">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="group">
      <label class="label">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="mainBtn">Sign In</button>
  </form>

  <div class="footer">
    <span id="footerText">No account?</span> <a href="#" id="toggle">Create one</a>
  </div>

  <button class="skip-btn" id="skip">Skip login (Guest Mode)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const sc = supabase.createClient(S_URL, S_KEY);

let isLogin = true;
const form = document.getElementById('authForm');
const toggle = document.getElementById('toggle');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const mainBtn = document.getElementById('mainBtn');
const footerText = document.getElementById('footerText');
const error = document.getElementById('error');

toggle.onclick = (e) => {
  e.preventDefault();
  isLogin = !isLogin;
  title.textContent = isLogin ? 'Welcome' : 'Join Us';
  subtitle.textContent = isLogin ? 'Sign in to Boltoog AI' : 'Start your journey';
  mainBtn.textContent = isLogin ? 'Sign In' : 'Create Account';
  footerText.textContent = isLogin ? 'No account?' : 'Have an account?';
  toggle.textContent = isLogin ? 'Create one' : 'Sign in';
  error.style.display = 'none';
};

form.onsubmit = async (e) => {
  e.preventDefault();
  mainBtn.disabled = true;
  mainBtn.textContent = 'Processing...';
  error.style.display = 'none';

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error: err } = isLogin 
    ? await sc.auth.signInWithPassword({ email, password })
    : await sc.auth.signUp({ email, password });

  if (err) {
    error.textContent = err.message;
    error.style.display = 'block';
    mainBtn.disabled = false;
    mainBtn.textContent = isLogin ? 'Sign In' : 'Create Account';
  } else {
    localStorage.removeItem('boltoog_guest');
    window.location.href = '/';
  }
};

document.getElementById('skip').onclick = () => {
  localStorage.setItem('boltoog_guest', 'true');
  window.location.href = '/';
};

sc.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/';
});
</script>
</body>
</html>
