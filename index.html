<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Boltoog AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #09090b; --s1: #18181b; --s2: #27272a;
  --accent: #a78bfa; --deep: #7c3aed;
  --text: #fafafa; --muted: #71717a; --sub: #a1a1aa;
  --border: rgba(255,255,255,0.07);
  --glass: rgba(9,9,11,0.92);
  --ease: cubic-bezier(.16, 1, .3, 1);
}
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }

#app-root { display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }

/* HEADER */
.hdr {
  flex: 0 0 60px; padding-top: env(safe-area-inset-top, 0px);
  background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  padding-left: 16px; padding-right: 16px; z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--deep), #6d28d9); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.brand { font-size: 16px; font-weight: 700; }

/* CHAT */
.chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; background: var(--bg); -webkit-overflow-scrolling: touch; }
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* INPUT */
.dock { flex: 0 0 auto; background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
.input-row { max-width: 700px; margin: 0 auto; background: var(--s1); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: flex-end; padding: 6px 6px 6px 14px; gap: 10px; }
#msg { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 16px; resize: none; min-height: 24px; max-height: 120px; padding: 8px 0; line-height: 1.5; font-family: inherit; }
#sendBtn { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--deep); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.2s; }
#sendBtn.active { opacity: 1; }

/* SIDEBAR */
.sb { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: #0d0d0f; border-right: 1px solid var(--border); z-index: 500; transform: translateX(-100%); transition: transform 0.3s var(--ease); display: flex; flex-direction: column; }
.sb.open { transform: translateX(0); }
.sb-head { padding: 20px; border-bottom: 1px solid var(--border); }
.sb-list { flex: 1; overflow-y: auto; padding: 10px; }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; color: var(--sub); font-size: 14px; cursor: pointer; margin-bottom: 2px; }
.sb-item:hover { background: var(--s1); color: var(--text); }
.sb-item.active { background: rgba(124,58,237,0.15); color: var(--accent); }
.new-btn { width: 100%; padding: 12px; background: var(--s1); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 450; display: none; backdrop-filter: blur(4px); }
.overlay.open { display: block; }

/* MSG */
.msg-grp { margin-bottom: 20px; display: flex; flex-direction: column; }
.msg-lbl { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
.bubble { padding: 12px 16px; font-size: 15px; line-height: 1.6; border-radius: 18px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
.bubble.user { align-self: flex-end; background: var(--deep); color: #fff; border-bottom-right-radius: 4px; }
.bubble.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble.err { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }

/* THINKING */
.think { display: flex; gap: 4px; padding: 10px 14px; background: var(--s1); border-radius: 15px; align-self: flex-start; margin-bottom: 20px; }
.think span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: dotP 1.4s infinite; }
.think span:nth-child(2) { animation-delay: 0.2s; }
.think span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotP { 0%,100% { transform:scale(0.7); opacity:0.3; } 50% { transform:scale(1.1); opacity:1; } }

#splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo" style="width:60px; height:60px; font-size:30px;">⚡</div>
  <p style="color:var(--muted); font-size:12px; margin-top:20px; letter-spacing:2px;">BOLTOOG AI</p>
</div>

<div id="app-root">
  <div class="overlay" id="overlay"></div>
  
  <aside class="sb" id="sb">
    <div class="sb-head">
      <button class="new-btn" id="newBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>
    <div class="sb-list" id="sbList"></div>
  </aside>

  <header class="hdr">
    <div class="hdr-left">
      <button class="logo" id="menuBtn" style="border:none; cursor:pointer;">⚡</button>
      <span class="brand">Boltoog AI</span>
    </div>
    <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <main class="chat-area" id="chat">
    <div id="welcome" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:15px; opacity:0.8;">
      <div style="font-size:50px;">⚡</div>
      <h2 style="font-size:26px;">Hey! I'm Boltoog</h2>
      <p style="color:var(--muted); max-width: 250px;">Your personal AI. Ask me anything!</p>
    </div>
  </main>

  <footer class="dock">
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Type a message..."></textarea>
      <button id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const sbClient = supabase.createClient(S_URL, S_KEY);

let session = null, currentId = null, chatHistory = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const sbList = document.getElementById('sbList');
const sidebar = document.getElementById('sb');
const overlay = document.getElementById('overlay');
const splash = document.getElementById('splash');

// NUCLEAR KEYBOARD FIX
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app-root').style.height = window.visualViewport.height + 'px';
    window.scrollTo(0,0);
    scrollDown();
  });
}

async function init() {
  const { data } = await sbClient.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  session = data.session;
  await loadHistory();
  splash.style.display = 'none';
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${session.access_token}` } });
    const d = await r.json();
    if (r.status === 401) { logout(); return; }
    sbList.innerHTML = '';
    if (!d.chats || d.chats.length === 0) {
      sbList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No chats yet</div>';
      return;
    }
    d.chats.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sb-item' + (c.id === currentId ? ' active' : '');
      el.innerHTML = `
        <span style="font-size:16px;flex-shrink:0">💬</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title || 'New Chat'}</span>
        <button class="del-btn" style="background:none;border:none;color:var(--muted);padding:4px;cursor:pointer" onclick="event.stopPropagation();delChat('${c.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>`;
      el.onclick = () => openChat(c.id);
      sbList.appendChild(el);
    });
  } catch(e) {}
}

async function openChat(id) {
  currentId = id; chatHistory = [];
  chatEl.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Loading...</div>';
  closeSidebar();
  const r = await fetch(`/api/chat-details?id=${id}`, { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  if (r.status === 401) { logout(); return; }
  chatEl.innerHTML = '';
  (d.messages || []).forEach(m => {
    addBubble(m.role === 'user' ? 'user' : 'ai', m.content);
    chatHistory.push({ role: m.role, parts: [{ text: m.content }] });
  });
  scrollDown();
  loadHistory();
}

async function delChat(id) {
  if (!confirm('Delete?')) return;
  await fetch(`/api/delete-chat?id=${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${session.access_token}` } });
  if (currentId === id) location.reload(); else loadHistory();
}

function addBubble(type, text) {
  const g = document.createElement('div');
  g.className = 'msg-grp';
  g.innerHTML = `<div class="msg-lbl">${type==='user'?'YOU':'BOLTOOG'}</div><div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(g);
  scrollDown();
}

function showThink() {
  const t = document.createElement('div');
  t.className = 'think';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  scrollDown();
  return t;
}

function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

async function logout() { await sbClient.auth.signOut(); window.location.href = '/login'; }

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  if (document.getElementById('welcome')) document.getElementById('welcome').remove();
  addBubble('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('active');
  busy = true;
  const dot = showThink();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: chatHistory, chatId: currentId })
    });
    const d = await r.json();
    dot.remove();

    if (r.status === 401) { alert('Session expired.'); logout(); return; }

    if (d.response) {
      addBubble('ai', d.response);
      chatHistory.push({ role: 'user', parts: [{ text: val }] });
      chatHistory.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currentId) { currentId = d.chatId; loadHistory(); }
    } else {
      alert('AI ERROR:\n' + d.error + (d.details ? '\n\nDetails: ' + d.details : ''));
      const b = document.createElement('div'); b.className = 'bubble ai err'; b.textContent = 'Error: ' + d.error; chatEl.appendChild(b);
    }
  } catch (e) { dot.remove(); addBubble('ai', 'Connection error.'); } finally { busy = false; scrollDown(); }
}

msgEl.oninput = () => { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px'; sendBtn.classList.toggle('active', msgEl.value.trim().length > 0); };
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
sendBtn.onclick = send;
document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('open'); overlay.classList.add('open'); };
document.getElementById('newBtn').onclick = () => { location.reload(); };
document.getElementById('logoutBtn').onclick = logout;
overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); };
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

init();
</script>
</body>
</html>
