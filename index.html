<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boltoog - Premium AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #00f2ff;
      --secondary: #006aff;
      --bg-dark: #050505;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-dim: #a1a1aa;
      --user-msg-bg: linear-gradient(135deg, #006aff, #00d4ff);
      --ai-msg-bg: rgba(255, 255, 255, 0.05);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(0, 106, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
      color: var(--text-main);
      height: 100vh;
      height: -webkit-fill-available;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Decorative Elements */
    .bg-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.1;
      pointer-events: none;
      z-index: -1;
    }

    .header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo-container {
      position: relative;
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 20px rgba(0, 106, 255, 0.3);
    }

    .logo-container::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border-radius: 16px;
      z-index: -1;
      opacity: 0.5;
      filter: blur(8px);
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      padding-bottom: 100px; /* Space for floating input */
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }

    .messages-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 15px;
      line-height: 1.6;
      position: relative;
      animation: messageAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes messageAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-msg-bg);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 10px 20px rgba(0, 106, 255, 0.2);
    }

    .message.ai {
      align-self: flex-start;
      background: var(--ai-msg-bg);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(5px);
    }

    .message-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      display: block;
      opacity: 0.7;
    }

    /* Loading States */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 15px;
      background: var(--ai-msg-bg);
      border-radius: 15px;
      width: fit-content;
      border: 1px solid var(--glass-border);
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      animation: dotTyping 1.4s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotTyping {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Floating Input Section */
    .input-container {
      position: absolute;
      bottom: 24px;
      left: 20px;
      right: 20px;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-wrapper {
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 8px 8px 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .input-wrapper:focus-within {
      border-color: var(--secondary);
      box-shadow: 0 0 0 4px rgba(0, 106, 255, 0.1), 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-family: inherit;
      padding: 10px 0;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none;
      border-radius: 14px;
      color: black;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 106, 255, 0.4);
    }

    .send-btn:disabled {
      background: #222;
      color: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 60px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3));
    }

    .empty-state h2 {
      color: white;
      font-size: 24px;
      margin-bottom: 12px;
    }

    /* Mobile Specific Fixes */
    @media (max-width: 600px) {
      .app-container {
        max-width: 100%;
        border-radius: 0;
      }

      .input-container {
        bottom: 16px;
        left: 12px;
        right: 12px;
      }

      .message {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="bg-glow" style="top: 10%; left: 10%;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 10%; background: var(--secondary);"></div>

    <header class="header">
      <div class="logo-container">⚡</div>
      <div class="header-info">
        <h1>Boltoog AI</h1>
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>Online & Ready</span>
        </div>
      </div>
    </header>

    <main class="messages-area" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✨</div>
        <h2>Hello, I'm Boltoog</h2>
        <p>Your premium AI assistant. Ask me anything about code, design, or just chat!</p>
      </div>
    </main>

    <div class="input-container" id="inputContainer">
      <div class="input-wrapper">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Type your message here..." 
          autocomplete="off"
        >
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const inputContainer = document.getElementById('inputContainer');
    const emptyState = document.getElementById('emptyState');

    let isTyping = false;

    // Handle viewport height for mobile
    function updateHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      // Update app container height explicitly for some browsers
      document.getElementById('appContainer').style.height = `${window.innerHeight}px`;
    }

    window.addEventListener('resize', updateHeight);
    window.addEventListener('orientationchange', updateHeight);
    updateHeight();

    // Keyboard behavior logic
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        const viewportHeight = window.visualViewport.height;
        const fullHeight = window.innerHeight;
        const keyboardHeight = fullHeight - viewportHeight;
        
        if (keyboardHeight > 100) {
          // Keyboard is open
          inputContainer.style.transform = `translateY(-${keyboardHeight - 16}px)`;
          messagesArea.style.paddingBottom = `${keyboardHeight + 80}px`;
          scrollToBottom();
        } else {
          // Keyboard is closed
          inputContainer.style.transform = 'translateY(0)';
          messagesArea.style.paddingBottom = '100px';
        }
      });
    }

    userInput.addEventListener('input', () => {
      sendBtn.disabled = !userInput.value.trim();
    });

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) {
        handleSend();
      }
    });

    sendBtn.addEventListener('click', handleSend);

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isTyping) return;

      if (emptyState) emptyState.remove();

      addMessage(text, 'user');
      userInput.value = '';
      sendBtn.disabled = true;
      
      const loadingEl = showLoading();
      isTyping = true;
      scrollToBottom();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        const data = await response.json();
        loadingEl.remove();
        addMessage(data.response, 'ai');
      } catch (err) {
        loadingEl.remove();
        addMessage("Sorry, I encountered an error. Please try again.", 'ai');
      } finally {
        isTyping = false;
        scrollToBottom();
      }
    }

    function addMessage(content, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      
      const text = document.createElement('div');
      text.textContent = content;
      msg.appendChild(text);

      const time = document.createElement('span');
      time.className = 'message-time';
      time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      msg.appendChild(time);

      messagesArea.appendChild(msg);
      scrollToBottom();
    }

    function showLoading() {
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      messagesArea.appendChild(indicator);
      return indicator;
    }

    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }
  </script>
</body>
</html>
