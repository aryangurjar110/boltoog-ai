<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boltoog - AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0a0a0a;
      --accent: #00e5ff;
      --accent-light: #69f0ae;
      --text-dark: #f8fafc;
      --text-light: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(20, 20, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --msg-user-bg: rgba(0, 229, 255, 0.15);
      --msg-user-text: #ffffff;
      --msg-ai-bg: rgba(255, 255, 255, 0.05);
      --msg-ai-text: #e2e8f0;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      background-image: 
        radial-gradient(at 0% 0%, rgba(0, 229, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(105, 240, 174, 0.15) 0px, transparent 50%);
      color: var(--text-dark);
      min-height: var(--app-height, 100vh);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 800px;
      height: calc(var(--app-height, 100vh) - 32px);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: transform;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: rgba(10, 10, 10, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #000;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
      animation: pulseGlow 3s ease-in-out infinite alternate;
      will-change: transform, box-shadow;
    }

    @keyframes pulseGlow {
      from { box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); transform: scale(0.98); }
      to { box-shadow: 0 0 25px rgba(105, 240, 174, 0.4); transform: scale(1.02); }
    }

    .header-content h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header-content p {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .message {
      display: flex;
      gap: 8px;
      will-change: transform, opacity;
      animation: messageEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes messageEnter {
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.ai {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 20px;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 15px;
      letter-spacing: 0.2px;
    }

    .message.user .message-bubble {
      background: var(--msg-user-bg);
      color: var(--msg-user-text);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
    }

    .message.ai .message-bubble {
      background: var(--msg-ai-bg);
      color: var(--msg-ai-text);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }

    .loading {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 4px 0;
    }

    .loading-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      will-change: transform;
      animation: loadingBounce 1.4s infinite ease-in-out both;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes loadingBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .thinking-text {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      margin-left: 8px;
      opacity: 0.8;
    }

    .input-section {
      padding: 20px 24px;
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 6px 6px 6px 16px;
      transition: var(--transition);
      align-items: center;
    }

    .input-wrapper:focus-within {
      border-color: rgba(0, 229, 255, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1);
    }

    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      padding: 12px 0;
      font-size: 15px;
      color: #fff;
      font-family: inherit;
    }

    .input-wrapper input::placeholder {
      color: var(--text-light);
    }

    .input-wrapper button {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      will-change: transform;
    }

    .input-wrapper button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }

    .input-wrapper button:active:not(:disabled) {
      transform: scale(0.95);
    }

    .input-wrapper button:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      box-shadow: none;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-light);
      text-align: center;
      gap: 16px;
      animation: messageEnter 0.6s ease-out forwards;
    }

    .empty-state-icon {
      font-size: 48px;
      filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.2));
    }

    .empty-state h2 {
      font-size: 20px;
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 320px;
      line-height: 1.6;
      color: var(--text-light);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body {
        padding: 0;
      }

      .container {
        height: var(--app-height, 100vh);
        max-height: var(--app-height, 100vh);
        border-radius: 0;
        border: none;
        border-top: 1px solid var(--glass-border);
      }

      .header {
        padding: 10px 16px;
      }

      .header-icon {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .message-bubble {
        max-width: 90%;
        font-size: 14px;
        padding: 12px 16px;
      }

      .header-content h1 {
        font-size: 18px;
      }

      .messages {
        padding: 12px;
        gap: 12px;
      }

      .input-section {
        padding: 10px 16px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }
      
      .input-wrapper input {
        font-size: 16px; /* Prevents iOS auto-zoom */
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">⚡</div>
      <div class="header-content">
        <h1>Boltoog</h1>
        <p>AI-powered chatbot by Aryan</p>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="empty-state-icon">✨</div>
        <h2>Start a conversation</h2>
        <p>Ask me anything. I'm Boltoog, here to help with questions, ideas, and more.</p>
      </div>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <input
          type="text"
          id="messageInput"
          placeholder="Message Boltoog..."
          autocomplete="off"
        />
        <button id="sendButton" type="button" title="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';
    let conversationId = null;
    let isLoading = false;

    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    function init() {
      conversationId = localStorage.getItem('boltoogConversationId') || generateId();
      localStorage.setItem('boltoogConversationId', conversationId);

      setAppHeight();
      let lastWidth = window.innerWidth;
      window.addEventListener('resize', () => {
        if (window.innerWidth !== lastWidth) {
          lastWidth = window.innerWidth;
          setAppHeight();
        }
      });

      sendButton.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isLoading) {
          sendMessage();
        }
      });

      messageInput.addEventListener('input', () => {
        sendButton.disabled = messageInput.value.trim() === '';
      });

      // Fix for mobile keyboard orientation and smooth scroll
      messageInput.addEventListener('focus', () => {
        setTimeout(scrollToBottom, 300);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          scrollToBottom();
        });
      }

      sendButton.disabled = true;
    }

    function generateId() {
      return 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    }

    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }

    async function sendMessage() {
      const message = messageInput.value.trim();

      if (!message || isLoading) {
        return;
      }

      addMessage(message, 'user');
      messageInput.value = '';
      sendButton.disabled = true;
      isLoading = true;

      const loadingId = addLoadingMessage();

      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message,
            conversationId,
          }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to get response');
        }

        const data = await response.json();

        removeElement(loadingId);
        addMessage(data.response, 'ai', data.timestamp);
      } catch (error) {
        removeElement(loadingId);
        showError(error.message);
      } finally {
        isLoading = false;
        messageInput.focus();
        scrollToBottom();
      }
    }

    function addMessage(content, type, timestamp = null) {
      if (messagesContainer.querySelector('.empty-state')) {
        clearMessages();
      }

      const messageEl = document.createElement('div');
      messageEl.className = `message ${type}`;
      messageEl.id = 'msg_' + Date.now() + Math.random();

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'message-bubble';
      bubbleEl.textContent = content;

      messageEl.appendChild(bubbleEl);
      messagesContainer.appendChild(messageEl);
      
      // Ensure smooth scroll to bottom after DOM update
      requestAnimationFrame(() => {
        scrollToBottom();
      });

      return messageEl.id;
    }

    function addLoadingMessage() {
      if (messagesContainer.querySelector('.empty-state')) {
        clearMessages();
      }

      const messageEl = document.createElement('div');
      messageEl.className = 'message ai';
      messageEl.id = 'loading_' + Date.now();

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'message-bubble';
      bubbleEl.style.display = 'flex';
      bubbleEl.style.alignItems = 'center';

      bubbleEl.innerHTML = `
        <div class="loading">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <div class="thinking-text">Thinking...</div>
      `;

      messageEl.appendChild(bubbleEl);
      messagesContainer.appendChild(messageEl);
      
      requestAnimationFrame(() => {
        scrollToBottom();
      });

      return messageEl.id;
    }

    function showError(message) {
      const errorEl = document.createElement('div');
      errorEl.className = 'error-message';
      errorEl.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        ${message}
      `;

      const lastMessage = messagesContainer.lastElementChild;
      if (lastMessage) {
        lastMessage.parentNode.insertBefore(errorEl, lastMessage.nextSibling);
      } else {
        messagesContainer.appendChild(errorEl);
      }

      setTimeout(() => {
        errorEl.style.opacity = '0';
        errorEl.style.transform = 'translateY(-10px)';
        errorEl.style.transition = 'all 0.3s ease';
        setTimeout(() => errorEl.remove(), 300);
      }, 5000);
      
      scrollToBottom();
    }

    function clearMessages() {
      messagesContainer.innerHTML = '';
    }

    function removeElement(id) {
      const el = document.getElementById(id);
      if (el) {
        el.style.opacity = '0';
        el.style.transform = 'scale(0.95)';
        el.style.transition = 'all 0.2s ease';
        setTimeout(() => el.remove(), 200);
      }
    }

    function scrollToBottom() {
      if (messagesContainer) {
        const lastChild = messagesContainer.lastElementChild;
        if (lastChild) {
            lastChild.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
      }
    }

    init();
  </script>
</body>
</html>
