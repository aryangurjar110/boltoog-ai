<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boltoog - Pro AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: #121214;
      --accent: #00f2ff;
      --accent-deep: #0066ff;
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(10, 10, 12, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    .header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 16px rgba(0, 242, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header-title h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 100px 20px; /* Large bottom padding to never overlap input */
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar {
      width: 0;
    }

    .message {
      max-width: 85%;
      padding: 16px 20px;
      border-radius: 24px;
      font-size: 16px;
      line-height: 1.6;
      animation: msgReveal 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes msgReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-deep), #0044cc);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 10px 20px rgba(0, 102, 255, 0.1);
    }

    .message.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #e2e2e7;
      border-bottom-left-radius: 4px;
    }

    .time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      display: block;
      opacity: 0.6;
    }

    .input-dock {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .input-bar {
      max-width: 800px;
      margin: 0 auto;
      background: #1c1c1e;
      border-radius: 20px;
      padding: 6px 6px 6px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .input-bar:focus-within {
      border-color: var(--accent);
      background: #252529;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      font-family: inherit;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 16px;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .send-btn:hover {
      transform: scale(1.05);
      background: white;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #2c2c2e;
      color: #555;
      cursor: not-allowed;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 10px;
    }

    .typing div {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing div:nth-child(2) { animation-delay: 0.2s; }
    .typing div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    .empty {
      margin: auto;
      text-align: center;
      opacity: 0.5;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">
      <div class="logo-box">🪐</div>
      <div class="header-title">
        <h1>BOLTOOG AI</h1>
      </div>
    </div>
  </header>

  <main class="chat-container" id="chat">
    <div class="empty" id="empty">
      <div class="empty-icon">✨</div>
      <p>I'm here to help. Send me a message to start.</p>
    </div>
  </main>

  <div class="input-dock">
    <div class="input-bar">
      <input type="text" id="input" placeholder="Message Boltoog..." autocomplete="off">
      <button class="send-btn" id="btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const empty = document.getElementById('empty');

    let loading = false;

    // Handle Height
    function res() { document.body.style.height = window.innerHeight + 'px'; }
    window.addEventListener('resize', res);
    res();

    input.addEventListener('input', () => btn.disabled = !input.value.trim());
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !btn.disabled) send(); });
    btn.addEventListener('click', send);

    let history = [];

    async function send() {
      const text = input.value.trim();
      if (!text || loading) return;

      if (empty) empty.remove();
      add('user', text);
      input.value = '';
      btn.disabled = true;
      loading = true;

      const loader = show();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: text,
            history: history 
          })
        });
        const data = await res.json();
        loader.remove();
        
        if (data.response) {
          add('ai', data.response);
          // Update history
          history.push({ role: "user", parts: [{ text: text }] });
          history.push({ role: "model", parts: [{ text: data.response }] });
        } else {
          add('ai', "Error: " + (data.error || "Unknown response from server"));
        }
      } catch (e) {
        loader.remove();
        add('ai', "Failed to connect to Boltoog. Please check your internet.");
      } finally {
        loading = false;
        scroll();
      }
    }

    function add(type, text) {
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.innerHTML = `<div>${text}</div><span class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
      chat.appendChild(div);
      requestAnimationFrame(scroll);
    }

    function show() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.innerHTML = '<div></div><div></div><div></div>';
      chat.appendChild(div);
      scroll();
      return div;
    }

    function scroll() {
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
