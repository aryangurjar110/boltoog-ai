<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boltoog - Next Gen AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --accent: #007AFF;
      --accent-glow: rgba(0, 122, 255, 0.3);
      --text: #FFFFFF;
      --text-muted: #8E8E93;
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(25, 25, 25, 0.8);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Background Decorations */
    .glow-top {
      position: absolute;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 300px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #007AFF, #00C7FF);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
    }

    .header-title h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-title p {
      font-size: 11px;
      color: #34C759;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-title p::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #34C759;
      border-radius: 50%;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      z-index: 1;
    }

    .chat-area::-webkit-scrollbar {
      width: 0;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: springUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.1) forwards;
      position: relative;
    }

    @keyframes springUp {
      from { opacity: 0; transform: translateY(15px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: white;
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 4px;
      display: block;
      text-align: right;
      opacity: 0.5;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      max-width: 280px;
    }

    .empty-state h2 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Footer / Input */
    .footer {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      border-top: 1px solid var(--border);
      z-index: 100;
    }

    .input-row {
      background: #1C1C1E;
      border-radius: 24px;
      padding: 4px 4px 4px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .input-row:focus-within {
      border-color: rgba(255, 255, 255, 0.2);
      background: #2C2C2E;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      padding: 10px 0;
    }

    .send-button {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .send-button:active {
      transform: scale(0.9);
    }

    .send-button:disabled {
      background: #3A3A3C;
      color: #8E8E93;
    }

    /* Typing Indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 10px;
    }

    .typing span {
      width: 5px;
      height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @media (max-width: 600px) {
      .message { max-width: 85%; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="glow-top"></div>

  <header class="header">
    <div class="header-left">
      <div class="avatar">B</div>
      <div class="header-title">
        <h1>Boltoog AI</h1>
        <p>Active now</p>
      </div>
    </div>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <h2>Welcome.</h2>
      <p>I am Boltoog, your personal AI assistant. How can I help you today?</p>
    </div>
  </main>

  <footer class="footer" id="footer">
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Message" autocomplete="off">
      <button class="send-button" id="sendBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </footer>

  <script>
    const chatArea = document.getElementById('chatArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    let isProcessing = false;

    // Mobile Height & Keyboard Fix
    function fixHeight() {
      document.body.style.height = `${window.innerHeight}px`;
    }
    window.addEventListener('resize', fixHeight);
    fixHeight();

    // Scroll Fix
    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Input Events
    msgInput.addEventListener('input', () => {
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) handleSend();
    });

    sendBtn.addEventListener('click', handleSend);

    async function handleSend() {
      const text = msgInput.value.trim();
      if (!text || isProcessing) return;

      if (emptyState) emptyState.remove();

      addMessage(text, 'user');
      msgInput.value = '';
      sendBtn.disabled = true;
      
      const loader = showTyping();
      isProcessing = true;
      scrollToBottom();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        loader.remove();
        addMessage(data.response, 'ai');
      } catch (err) {
        loader.remove();
        addMessage("Connection error. Please try again.", 'ai');
      } finally {
        isProcessing = false;
        scrollToBottom();
      }
    }

    function addMessage(content, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<div>${content}</div><span class="msg-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
      chatArea.appendChild(div);
      
      // Use requestAnimationFrame for smoother scroll after DOM update
      requestAnimationFrame(() => {
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      });
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatArea.appendChild(div);
      return div;
    }

    // Keyboard uplift fix: browser handles it naturally when body height is innerHeight
  </script>
</body>
</html>
