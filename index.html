<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Boltoog AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #09090b; --s1: #121214; --s2: #1c1c1f;
  --accent: #a78bfa; --deep: #7c3aed;
  --text: #ffffff; --muted: #71717a; --sub: #a1a1aa;
  --border: rgba(255,255,255,0.08);
  --glass: rgba(9,9,11,0.85);
  --ease: cubic-bezier(.16, 1, .3, 1);
}
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; position: fixed; }

#app-root { display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }

/* HEADER */
.hdr {
  flex: 0 0 70px; padding-top: env(safe-area-inset-top, 0px);
  background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  padding-left: 18px; padding-right: 18px; z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.logo-btn { 
  width: 38px; height: 38px; background: linear-gradient(135deg, var(--deep), #4c1d95); 
  border-radius: 12px; display: flex; align-items: center; justify-content: center; 
  font-size: 20px; box-shadow: 0 8px 20px rgba(124,58,237,0.3); border:none; cursor:pointer;
  transition: 0.3s var(--ease);
}
.logo-btn:hover { transform: scale(1.05) rotate(5deg); }
.brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

/* CHAT AREA */
.chat-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: var(--bg); -webkit-overflow-scrolling: touch; }
.chat-main::-webkit-scrollbar { width: 4px; }
.chat-main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* INPUT DOCK */
.dock { flex: 0 0 auto; background: var(--glass); backdrop-filter: blur(25px); border-top: 1px solid var(--border); padding: 14px 18px; padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
.input-row { max-width: 800px; margin: 0 auto; background: var(--s1); border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 12px; transition: border 0.3s; }
.input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(167,139,250,0.1); }
#msg { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 16px; resize: none; min-height: 24px; max-height: 150px; padding: 10px 0; line-height: 1.5; font-family: inherit; }
#sendBtn { width: 44px; height: 44px; border-radius: 14px; border: none; background: var(--deep); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.3s var(--ease); transform: scale(0.9); }
#sendBtn.active { opacity: 1; transform: scale(1); }
#sendBtn:active { transform: scale(0.95); }

/* SIDEBAR PREMIUM */
.sb { 
  position: fixed; top: 0; left: 0; bottom: 0; width: 300px; 
  background: #09090b; border-right: 1px solid var(--border); z-index: 500; 
  transform: translateX(-100%); transition: transform 0.4s var(--ease); 
  display: flex; flex-direction: column; padding: 20px; gap: 20px;
}
.sb.open { transform: translateX(0); box-shadow: 20px 0 80px rgba(0,0,0,0.8); }
.sb-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 5px; }
.sb-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.sb-item { 
  display: flex; align-items: center; gap: 12px; padding: 14px; 
  border-radius: 14px; color: var(--sub); font-size: 14px; cursor: pointer; 
  transition: 0.2s; border: 1px solid transparent;
}
.sb-item:hover { background: var(--s1); color: var(--text); border-color: var(--border); }
.sb-item.active { background: rgba(124,58,237,0.1); color: var(--accent); border-color: rgba(124,58,237,0.2); }
.sb-icon { width: 32px; height: 32px; background: var(--s2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.sb-item.active .sb-icon { background: var(--deep); color: #fff; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 450; display: none; backdrop-filter: blur(8px); }
.overlay.open { display: block; }

/* MESSAGES PREMIUM */
.msg-box { margin-bottom: 25px; display: flex; flex-direction: column; animation: slideUp 0.4s var(--ease); }
@keyframes slideUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:none; } }
.msg-meta { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.msg-meta::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.bubble { padding: 14px 20px; font-size: 15.5px; line-height: 1.6; border-radius: 20px; max-width: 88%; white-space: pre-wrap; word-break: break-word; position: relative; }
.bubble.user { align-self: flex-end; background: linear-gradient(135deg, var(--deep), #6d28d9); color: #fff; border-bottom-right-radius: 5px; box-shadow: 0 10px 25px rgba(124,58,237,0.2); }
.bubble.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); border-bottom-left-radius: 5px; color: #e4e4e7; }
.bubble.err { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: #fca5a5; }

/* THINKING */
.typing { display: flex; gap: 5px; padding: 12px 18px; background: var(--s1); border-radius: 18px; align-self: flex-start; margin-bottom: 25px; border: 1px solid var(--border); }
.typing span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: tPulse 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tPulse { 0%,100% { transform:scale(0.8); opacity:0.3; } 50% { transform:scale(1.1); opacity:1; } }

#splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-btn" style="width:70px; height:70px; font-size:35px;">⚡</div>
  <h2 style="margin-top:25px; font-weight:700; letter-spacing:4px; font-size:14px; color:var(--muted)">BOLTOOG AI</h2>
</div>

<div id="app-root">
  <div class="overlay" id="overlay"></div>
  
  <aside class="sb" id="sb">
    <div>
      <h2 class="sb-title">History</h2>
      <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">Your saved conversations</p>
      <button class="new-btn" id="newBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>
    <div class="sb-list" id="sbList"></div>
    <button id="sidebarLogout" style="margin-top:auto; background:var(--s1); border:1px solid var(--border); padding:12px; border-radius:12px; color:var(--muted); cursor:pointer;">Logout</button>
  </aside>

  <header class="hdr">
    <div class="hdr-left">
      <button class="logo-btn" id="menuBtn">⚡</button>
      <span class="brand">Boltoog AI</span>
    </div>
    <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer; padding:8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <main class="chat-main" id="chat">
    <div id="welcome" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:20px;">
      <div style="font-size:60px; filter: drop-shadow(0 0 20px var(--accent-glow));">✨</div>
      <h2 style="font-size:28px; font-weight:700;">Ready to assist.</h2>
      <p style="color:var(--muted); max-width: 280px; font-size:15px; line-height:1.6;">Ask me anything from coding to creative writing. I'm here to help!</p>
    </div>
  </main>

  <footer class="dock">
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Type your message..."></textarea>
      <button id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const supabaseC = supabase.createClient(S_URL, S_KEY);

let session = null, currentId = null, chatHistory = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const sbList = document.getElementById('sbList');
const sidebar = document.getElementById('sb');
const overlay = document.getElementById('overlay');
const splash = document.getElementById('splash');

// KEYBOARD PERMANENT FOCUS
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app-root').style.height = window.visualViewport.height + 'px';
    window.scrollTo(0,0);
    scrollDown();
  });
}

async function start() {
  const { data } = await supabaseC.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  session = data.session;
  await loadHistory();
  setTimeout(() => splash.style.display = 'none', 800);
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${session.access_token}` } });
    const d = await r.json();
    if (r.status === 401) { logout(); return; }
    sbList.innerHTML = '';
    if (!d.chats || d.chats.length === 0) {
      sbList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">No history yet</div>';
      return;
    }
    d.chats.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sb-item' + (c.id === currentId ? ' active' : '');
      const icon = c.title ? getTopicIcon(c.title) : '💬';
      el.innerHTML = `
        <div class="sb-icon">${icon}</div>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title || 'Untitled Chat'}</span>
        <button style="background:none;border:none;color:var(--muted);padding:5px;" onclick="event.stopPropagation();delChat('${c.id}')">✕</button>`;
      el.onclick = () => openChat(c.id);
      sbList.appendChild(el);
    });
  } catch(e) {}
}

function getTopicIcon(t) {
  t = t.toLowerCase();
  if (t.includes('code') || t.includes('python') || t.includes('js')) return '👨‍💻';
  if (t.includes('write') || t.includes('story') || t.includes('poem')) return '✍️';
  if (t.includes('help') || t.includes('how')) return '💡';
  if (t.includes('math') || t.includes('calc')) return '🔢';
  return '💬';
}

async function openChat(id) {
  currentId = id; chatHistory = [];
  chatEl.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)">Loading conversation...</div>';
  closeSidebar();
  const r = await fetch(`/api/chat-details?id=${id}`, { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  if (r.status === 401) { logout(); return; }
  chatEl.innerHTML = '';
  (d.messages || []).forEach(m => {
    addBubble(m.role === 'user' ? 'user' : 'ai', m.content);
    chatHistory.push({ role: m.role, parts: [{ text: m.content }] });
  });
  scrollDown();
  loadHistory();
}

async function delChat(id) {
  if (!confirm('Delete this conversation?')) return;
  await fetch(`/api/delete-chat?id=${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${session.access_token}` } });
  if (currentId === id) location.reload(); else loadHistory();
}

function addBubble(type, text) {
  const g = document.createElement('div');
  g.className = 'msg-box';
  g.innerHTML = `<div class="msg-meta"><span>${type==='user'?'YOU':'BOLTOOG AI'}</span></div><div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(g);
  scrollDown();
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  scrollDown();
  return t;
}

function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

async function logout() { await supabaseC.auth.signOut(); window.location.href = '/login'; }

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  if (document.getElementById('welcome')) document.getElementById('welcome').remove();
  addBubble('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('active');
  busy = true;
  const dot = showTyping();
  
  // FIX: Force focus back to input immediately to prevent keyboard flickering
  msgEl.focus();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: chatHistory, chatId: currentId })
    });
    const d = await r.json();
    dot.remove();

    if (r.status === 401) { logout(); return; }

    if (d.response) {
      addBubble('ai', d.response);
      chatHistory.push({ role: 'user', parts: [{ text: val }] });
      chatHistory.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currentId) { currentId = d.chatId; loadHistory(); }
    } else {
      alert('AI ERROR:\n' + d.error + (d.details ? '\n\nDetails: ' + d.details : ''));
      const b = document.createElement('div'); b.className = 'bubble ai err'; b.textContent = 'Error: ' + d.error; chatEl.appendChild(b);
    }
  } catch (e) { dot.remove(); addBubble('ai', 'Connection lost.'); } finally { busy = false; scrollDown(); msgEl.focus(); }
}

msgEl.oninput = () => { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 150) + 'px'; sendBtn.classList.toggle('active', msgEl.value.trim().length > 0); };
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

// FIX: Prevent button click from blurring the textarea
sendBtn.onmousedown = (e) => { e.preventDefault(); };
sendBtn.onclick = send;

document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('open'); overlay.classList.add('open'); };
document.getElementById('newBtn').onclick = () => { location.reload(); };
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('sidebarLogout').onclick = logout;
overlay.onclick = closeSidebar;
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

start();
</script>
</body>
</html>
