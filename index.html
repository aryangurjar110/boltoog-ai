<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Boltoog AI - Premium AI Assistant by Aryan">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Boltoog AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-hover: #27272a;
      --accent: #a78bfa;
      --accent-glow: rgba(167,139,250,0.15);
      --accent-deep: #7c3aed;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(167,139,250,0.2);
      --glass: rgba(9,9,11,0.85);
      --user-bubble: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      --ai-bubble: #18181b;
      --radius: 20px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html { height:100%; overflow:hidden; touch-action:none; }
    body {
      height:100%; overflow:hidden;
      background:var(--bg); color:var(--text);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      -webkit-font-smoothing:antialiased;
      position:fixed; width:100%; top:0; left:0;
      touch-action:none; overscroll-behavior:none;
    }

    /* === MAIN LAYOUT === */
    #app {
      display:flex;
      height:100vh;
      width: 100vw;
      overflow:hidden;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 280px;
      height: 100%;
      background: #0c0c0e;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s var(--ease);
      z-index: 200;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .new-chat-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .new-chat-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
    
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .history-item {
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.2s var(--ease);
      border: 1px solid transparent;
    }
    .history-item:hover { background: var(--surface); color: var(--text); }
    .history-item.active { background: var(--accent-glow); color: var(--accent); border-color: var(--border-accent); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      min-width: 0;
    }

    /* === AMBIENT BG === */
    .ambient { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .ambient::before {
      content:''; position:absolute; width:600px; height:600px; top:-200px; right:-200px;
      background:radial-gradient(circle,rgba(124,58,237,0.08) 0%,transparent 70%);
      animation:ambFloat 20s ease-in-out infinite alternate;
    }

    /* === HEADER === */
    .header {
      position:relative; z-index:50; flex-shrink:0;
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      background:var(--glass);
      backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
      border-bottom:1px solid var(--border);
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .logo {
      width:38px; height:38px;
      background:var(--user-bubble); border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; box-shadow:0 4px 20px rgba(124,58,237,0.3);
    }
    .header-text h1 {
      font-size:16px; font-weight:700; letter-spacing:-0.3px;
      background:linear-gradient(135deg,#fff,#a1a1aa);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width:36px; height:36px; border-radius:10px;
      border:1px solid var(--border); background:transparent; color:var(--text-muted);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.2s var(--ease);
    }
    .icon-btn:hover { background:var(--surface); color:var(--text); border-color:var(--border-accent); }
    .icon-btn.menu-btn { display: none; }

    /* === CHAT AREA === */
    .chat-area {
      flex:1; min-height:0;
      overflow-y:auto; overflow-x:hidden;
      padding:20px 16px;
      display:flex; flex-direction:column; gap:6px;
      -webkit-overflow-scrolling:touch;
      position:relative; z-index:1;
    }
    .chat-area::-webkit-scrollbar { width:4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:40px 24px;
      animation:fadeUp 0.6s var(--ease) forwards;
    }

    /* === MESSAGES === */
    .msg-group { display:flex; flex-direction:column; gap:2px; }
    .msg-group + .msg-group { margin-top:16px; }
    .msg-label {
      font-size:11px; font-weight:600; text-transform:uppercase;
      color:var(--text-muted); padding:0 4px; margin-bottom:6px;
      display:flex; align-items:center; gap:6px;
    }
    .msg {
      padding:14px 18px; font-size:15px; line-height:1.65;
      animation:msgIn 0.35s var(--ease) forwards;
      opacity:0; transform:translateY(8px);
      word-wrap:break-word;
    }
    @keyframes msgIn { to{opacity:1;transform:translateY(0)} }
    .msg.user-msg {
      align-self:flex-end; max-width:82%;
      background:var(--user-bubble); color:#fff;
      border-radius:20px 20px 6px 20px;
    }
    .msg.ai-msg {
      align-self:flex-start; max-width:88%;
      background:var(--ai-bubble); border:1px solid var(--border);
      color:#e4e4e7; border-radius:20px 20px 20px 6px;
    }

    /* === INPUT DOCK === */
    .input-dock {
      flex-shrink:0;
      padding:12px 16px;
      padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
      background:var(--glass);
      backdrop-filter:blur(40px);
      border-top:1px solid var(--border);
      z-index: 100;
    }
    .input-wrapper {
      max-width:680px; margin:0 auto;
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; display:flex; align-items:flex-end;
      padding:6px 6px 6px 16px; gap:8px;
    }
    #msgInput {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-size:15px;
      resize:none; min-height:24px; max-height:120px;
      line-height:1.5; padding:8px 0;
    }
    .send-btn {
      width:40px; height:40px; border-radius:12px; border:none;
      background:var(--accent-deep); color:#fff;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; opacity:0.4; pointer-events:none;
      transition:all 0.2s var(--ease);
    }
    .send-btn.active { opacity:1; pointer-events:auto; }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
      .icon-btn.menu-btn { display: flex; }
      .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(4px);
        z-index: 150;
      }
      .sidebar-overlay.open { display: block; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Chat
        </button>
      </div>
      <div class="history-list" id="historyList">
        <!-- History items will be injected here -->
      </div>
    </aside>

    <main class="main-content">
      <div class="ambient"></div>
      <header class="header">
        <div class="header-left">
          <button class="icon-btn menu-btn" id="menuBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="logo">⚡</div>
          <div class="header-text">
            <h1>Boltoog AI</h1>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="logoutBtn" title="Sign Out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">⚡</div>
          <h2>Welcome back!</h2>
          <p>Select a past chat from the sidebar or start a new one.</p>
        </div>
      </div>

      <div class="input-dock">
        <div class="input-wrapper">
          <textarea id="msgInput" rows="1" placeholder="Ask Boltoog anything..." autocomplete="off"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // === AUTH CHECK ===
    const sessionData = localStorage.getItem('boltoog_session');
    let session = null;
    try {
      session = sessionData ? JSON.parse(sessionData) : null;
    } catch(e) { session = null; }

    if (!session || !session.access_token) {
      localStorage.removeItem('boltoog_session');
      if (window.location.pathname !== '/login') {
        window.location.href = '/login';
      }
    }

    const chatArea = document.getElementById('chatArea');
    const historyList = document.getElementById('historyList');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    let currentChatId = null;
    let loading = false;
    let chatHistory = []; // Local history for Gemini

    // === UI HANDLERS ===
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    }
    menuBtn.onclick = toggleSidebar;
    sidebarOverlay.onclick = toggleSidebar;

    logoutBtn.onclick = () => {
      localStorage.removeItem('boltoog_session');
      window.location.href = '/login';
    };

    newChatBtn.onclick = () => {
      currentChatId = null;
      chatHistory = [];
      chatArea.innerHTML = `
        <div class="welcome">
          <div class="welcome-icon">⚡</div>
          <h2>New Chat</h2>
          <p>Ask Boltoog anything to start a conversation.</p>
        </div>`;
      document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
      if (window.innerWidth <= 768) toggleSidebar();
    };

    // === HISTORY LOGIC ===
    async function loadHistory() {
      try {
        const res = await fetch('/api/history', {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('boltoog_session');
          window.location.href = '/login';
          return;
        }
        const data = await res.json();
        if (data.chats) {
          historyList.innerHTML = '';
          data.chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'history-item';
            if (chat.id === currentChatId) item.classList.add('active');
            item.textContent = chat.title || 'Untitled Chat';
            item.onclick = () => loadChat(chat.id);
            historyList.appendChild(item);
          });
        }
      } catch (err) { console.error("History error:", err); }
    }

    async function loadChat(id) {
      if (currentChatId === id) return;
      currentChatId = id;
      chatArea.innerHTML = '<div class="welcome">Loading messages...</div>';
      if (window.innerWidth <= 768) toggleSidebar();
      
      try {
        const res = await fetch(`/api/chat-details?id=${id}`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('boltoog_session');
          window.location.href = '/login';
          return;
        }
        const data = await res.json();
        chatArea.innerHTML = '';
        chatHistory = [];
        
        if (data.messages) {
          data.messages.forEach(msg => {
            addMessage(msg.role === 'model' ? 'ai' : 'user', msg.content);
            chatHistory.push({ role: msg.role, parts: [{ text: msg.content }] });
          });
        }
        loadHistory(); // Refresh active state
      } catch (err) { chatArea.innerHTML = '<div class="welcome">Error loading chat.</div>'; }
    }

    // === CHAT LOGIC ===
    async function send() {
      const text = msgInput.value.trim();
      if (!text || loading) return;

      if (!currentChatId) chatArea.innerHTML = '';
      addMessage('user', text);
      msgInput.value = '';
      msgInput.style.height = 'auto';
      loading = true;
      const typingEl = showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`
          },
          body: JSON.stringify({ message: text, history: chatHistory, chatId: currentChatId })
        });
        if (res.status === 401) {
          localStorage.removeItem('boltoog_session');
          window.location.href = '/login';
          return;
        }
        const data = await res.json();
        typingEl.remove();

        if (data.response) {
          addMessage('ai', data.response);
          chatHistory.push({ role: "user", parts: [{ text }] });
          chatHistory.push({ role: "model", parts: [{ text: data.response }] });
          if (!currentChatId) {
            currentChatId = data.chatId;
            loadHistory();
          }
        }
      } catch (e) {
        typingEl.remove();
        addMessage('ai', "Error connecting to Boltoog.");
      } finally {
        loading = false;
        scrollToBottom();
      }
    }

    function addMessage(type, text) {
      const group = document.createElement('div');
      group.className = 'msg-group';
      group.innerHTML = `
        <div class="msg-label">${type === 'user' ? '👤 YOU' : '⚡ BOLTOOG'}</div>
        <div class="msg ${type === 'user' ? 'user-msg' : 'ai-msg'}">${text}</div>
      `;
      chatArea.appendChild(group);
      scrollToBottom();
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'typing-wrap';
      wrap.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      chatArea.appendChild(wrap);
      scrollToBottom();
      return wrap;
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    msgInput.oninput = () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
      sendBtn.classList.toggle('active', msgInput.value.trim().length > 0);
    };
    msgInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
    sendBtn.onclick = send;

    // Initial load
    loadHistory();
  </script>
</body>
</html>
