<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Boltoog AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #09090b; --s1: #18181b; --s2: #27272a;
  --accent: #a78bfa; --deep: #7c3aed;
  --text: #fafafa; --muted: #71717a; --sub: #a1a1aa;
  --border: rgba(255,255,255,0.07);
  --glass: rgba(9,9,11,0.92);
  --ease: cubic-bezier(.16, 1, .3, 1);
  --hdr-h: 60px;
}
html, body { 
  height: 100%; width: 100%; 
  overflow: hidden; /* STOP BODY SCROLLING */
  background: var(--bg); color: var(--text); 
  font-family: 'Inter', sans-serif;
  position: fixed; /* PREVENT PULL-TO-REFRESH & BOUNCE */
}

/* === APP LAYOUT === */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh; /* DYNAMIC VIEWPORT HEIGHT */
  width: 100vw;
  overflow: hidden;
}

/* === HEADER === */
.hdr {
  flex: 0 0 var(--hdr-h);
  padding-top: env(safe-area-inset-top, 0px);
  height: calc(var(--hdr-h) + env(safe-area-inset-top, 0px));
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding-left: 16px; padding-right: 16px;
  z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 12px; }
.logo-box {
  width: 34px; height: 34px; background: linear-gradient(135deg, var(--deep), #6d28d9);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 4px 12px rgba(124,58,237,0.3);
}
.brand { font-size: 16px; font-weight: 700; color: #fff; }

/* === MAIN CHAT AREA (ONLY SCROLLABLE PART) === */
.chat {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: var(--bg);
  -webkit-overflow-scrolling: touch; /* SMOOTH IOS SCROLL */
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* === INPUT DOCK === */
.dock {
  flex: 0 0 auto;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  z-index: 100;
}
.input-row {
  max-width: 700px; margin: 0 auto;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 16px; display: flex; align-items: flex-end;
  padding: 6px 6px 6px 14px; gap: 8px;
}
#msg {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 16px; /* 16px PREVENTS IOS ZOOM */
  resize: none; min-height: 24px; max-height: 120px;
  padding: 8px 0; line-height: 1.5; font-family: inherit;
}
#sendBtn {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--deep); color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0.3; transition: 0.2s;
}
#sendBtn.on { opacity: 1; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }

/* === SIDEBAR === */
.sb {
  position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
  background: #0d0d0f; border-right: 1px solid var(--border);
  z-index: 500; transform: translateX(-100%);
  transition: transform 0.3s var(--ease);
  display: flex; flex-direction: column;
}
.sb.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
.sb-head { padding: 20px; border-bottom: 1px solid var(--border); }
.sb-list { flex: 1; overflow-y: auto; padding: 10px; }
.chat-item {
  display: flex; align-items: center; gap: 10px; padding: 12px;
  border-radius: 10px; color: var(--sub); font-size: 14px; cursor: pointer;
  margin-bottom: 2px; transition: 0.2s;
}
.chat-item:hover { background: var(--s1); color: var(--text); }
.chat-item.active { background: rgba(124,58,237,0.15); color: var(--accent); }
.del-btn { opacity:0; margin-left: auto; background:none; border:none; color:var(--muted); cursor:pointer; }
.chat-item:hover .del-btn { opacity:1; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 450; display: none; backdrop-filter: blur(4px);
}
.overlay.open { display: block; }

/* === MESSAGES === */
.msg-group { display: flex; flex-direction: column; animation: fadeUp 0.3s var(--ease); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.msg-label { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.bubble { 
  padding: 12px 16px; font-size: 15px; line-height: 1.6; 
  word-break: break-word; max-width: 85%; white-space: pre-wrap;
}
.bubble.user { align-self: flex-end; background: var(--deep); color: #fff; border-radius: 18px 18px 4px 18px; }
.bubble.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; }
.bubble.err { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }

/* === THINKING === */
.thinking {
  display: flex; gap: 5px; padding: 12px 16px; align-self: flex-start;
  background: var(--s1); border-radius: 18px; border: 1px solid var(--border);
}
.thinking span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s infinite; }
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%, 100% { transform: scale(0.7); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 1; } }

/* === UTILS === */
.icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; }
.menu-btn { display: none; }
@media (max-width: 768px) { .menu-btn { display: flex; } }

#splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-box" style="width:60px; height:60px; font-size:30px;">⚡</div>
  <div style="color:var(--muted); font-size:12px; letter-spacing:2px;">BOLTOOG AI</div>
</div>

<div id="app">
  <div class="overlay" id="overlay"></div>
  
  <aside class="sb" id="sb">
    <div class="sb-head">
      <button class="new-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>
    <div class="sb-list" id="sbList"></div>
  </aside>

  <header class="hdr">
    <div class="hdr-left">
      <button class="icon-btn menu-btn" id="menuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo-box">⚡</div>
      <span class="brand">Boltoog AI</span>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="logoutBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="chat" id="chat">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px;">
      <div style="font-size:48px; margin-bottom:16px;">⚡</div>
      <h2 style="font-size:24px; margin-bottom:8px;">How can I help?</h2>
      <p style="color:var(--muted); font-size:14px;">I'm Boltoog, your AI assistant. Start chatting below!</p>
    </div>
  </div>

  <div class="dock">
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Type a message..."></textarea>
      <button id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const supabaseClient = supabase.createClient(S_URL, S_KEY);

let session = null, currentId = null, chatHistory = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const sbList = document.getElementById('sbList');
const sidebar = document.getElementById('sb');
const overlay = document.getElementById('overlay');
const splash = document.getElementById('splash');

async function init() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    session = data.session;
    await loadHistory();
  } else {
    window.location.href = '/login';
    return;
  }
  splash.style.display = 'none';
}

async function loadHistory() {
  const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  sbList.innerHTML = '';
  if (d.chats) {
    d.chats.forEach(c => {
      const div = document.createElement('div');
      div.className = 'chat-item' + (c.id === currentId ? ' active' : '');
      div.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title || 'Chat'}</span><button class="del-btn" onclick="event.stopPropagation();delChat('${c.id}')">✕</button>`;
      div.onclick = () => openChat(c.id);
      sbList.appendChild(div);
    });
  }
}

async function openChat(id) {
  currentId = id; chatHistory = [];
  chatEl.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Loading chat...</div>';
  closeSidebar();
  const r = await fetch(`/api/chat-details?id=${id}`, { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  chatEl.innerHTML = '';
  (d.messages || []).forEach(m => {
    addMsg(m.role === 'user' ? 'user' : 'ai', m.content);
    chatHistory.push({ role: m.role, parts: [{ text: m.content }] });
  });
  scrollDown();
}

async function delChat(id) {
  if (!confirm('Delete chat?')) return;
  await fetch(`/api/delete-chat?id=${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${session.access_token}` } });
  if (currentId === id) location.reload();
  else loadHistory();
}

function addMsg(type, text) {
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `<div class="msg-label">${type === 'user' ? 'YOU' : 'BOLTOOG'}</div><div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(g);
  scrollDown();
}

function showThinking() {
  const t = document.createElement('div');
  t.className = 'thinking';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  scrollDown();
  return t;
}

function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  
  if (!currentId) chatEl.innerHTML = '';
  addMsg('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('on');
  busy = true;
  const dot = showThinking();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: chatHistory, chatId: currentId })
    });
    const d = await r.json();
    dot.remove();
    if (d.response) {
      addMsg('ai', d.response);
      chatHistory.push({ role: 'user', parts: [{ text: val }] });
      chatHistory.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currentId) { currentId = d.chatId; loadHistory(); }
    } else {
      const errEl = document.createElement('div');
      errEl.className = 'bubble err';
      errEl.textContent = 'Error: ' + (d.error || 'Failed to get response');
      chatEl.appendChild(errEl);
    }
  } catch (e) {
    dot.remove();
    addMsg('ai', 'Error: Connection lost.');
  } finally {
    busy = false; scrollDown();
  }
}

// Sidebar toggle
function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
document.getElementById('menuBtn').onclick = openSidebar;
overlay.onclick = closeSidebar;
document.getElementById('newChatBtn').onclick = () => { location.reload(); };
document.getElementById('logoutBtn').onclick = async () => {
  await supabaseClient.auth.signOut();
  window.location.href = '/login';
};

// Input handling
msgEl.oninput = () => {
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
  sendBtn.classList.toggle('on', msgEl.value.trim().length > 0);
};
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
sendBtn.onclick = send;

init();
</script>
</body>
</html>
