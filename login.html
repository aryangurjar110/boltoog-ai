<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Boltoog AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(24, 24, 27, 0.7);
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.2);
            --accent-deep: #7c3aed;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 24px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: url('login-bg.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--bg) 100%);
            opacity: 0.8;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.8s var(--ease);
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s var(--ease);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            margin-top: 10px;
        }

        .btn-primary {
            background: var(--accent-deep);
            color: white;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .divider {
            margin: 24px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-btns {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-secondary);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Error state */
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">⚡</div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your Boltoog AI account</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div id="errorMsg" class="error-msg">Invalid email or password</div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="divider">OR CONTINUE WITH</div>

            <div class="social-btns">
                <button class="btn btn-social" onclick="mockSocialLogin('Google')">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C9.03,19.27 6.59,17.38 6.59,12.03C6.59,6.68 9.03,4.79 12.19,4.79C13.9,4.79 15.58,5.44 16.46,6.45L18.46,4.45C17.03,2.73 14.74,2.06 12.19,2.06C7.31,2.06 3.86,5.11 3.86,12.03C3.86,18.95 7.31,22 12.19,22C17.41,22 21.4,18.31 21.4,12.03C21.4,11.69 21.38,11.39 21.35,11.1Z" />
                    </svg>
                    Google
                </button>
                <button class="btn btn-social" onclick="mockSocialLogin('Apple')">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M17.05,20.28C15.47,21.82 13.4,22.74 11.2,22.74C8.2,22.74 5.62,20.91 4.21,18.18C2.73,15.31 2.6,11.83 4.21,8.96C5.62,6.23 8.2,4.4 11.2,4.4C13.4,4.4 15.47,5.32 17.05,6.86L18.46,5.45C16.5,3.48 13.85,2.33 11.2,2.33C7.38,2.33 4.14,4.64 2.4,8.08C0.45,11.91 0.6,16.51 2.4,20.34C4.14,23.78 7.38,26.09 11.2,26.09C13.85,26.09 16.5,24.94 18.46,22.97L17.05,20.28Z" />
                    </svg>
                    Apple
                </button>
            </div>

            <p class="footer-text">
                Don't have an account? <a href="#">Sign up for free</a>
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple mock authentication
            if (email && password.length >= 6) {
                loginSuccess(email);
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        });

        function mockSocialLogin(provider) {
            console.log(`Logging in with ${provider}...`);
            loginSuccess(`${provider.toLowerCase()}User@example.com`);
        }

        function loginSuccess(email) {
            const session = {
                user: email,
                token: 'mock-jwt-' + Math.random().toString(36).substr(2),
                expires: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
            };
            localStorage.setItem('boltoog_session', JSON.stringify(session));
            
            // Show success state briefly
            document.querySelector('.btn-primary').innerHTML = 'Signing in...';
            document.querySelector('.btn-primary').style.opacity = '0.7';
            
            setTimeout(() => {
                window.location.href = '/';
            }, 800);
        }

        // Redirect if already logged in
        if (localStorage.getItem('boltoog_session')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
