<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Boltoog AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #09090b; --s1: #121214; --s2: #1c1c1f;
  --accent: #a78bfa; --deep: #7c3aed;
  --text: #ffffff; --muted: #71717a; --sub: #a1a1aa;
  --border: rgba(255,255,255,0.08);
  --glass: rgba(9,9,11,0.85);
  --ease: cubic-bezier(.16, 1, .3, 1);
}
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; position: fixed; }

#app-root { display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }

/* HEADER */
.hdr {
  flex: 0 0 70px; padding-top: env(safe-area-inset-top, 0px);
  background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  padding-left: 18px; padding-right: 18px; z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.logo-btn { width: 40px; height: 40px; background: linear-gradient(135deg, var(--deep), #4c1d95); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 8px 20px rgba(124,58,237,0.3); border:none; cursor:pointer; }
.brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

/* CHAT AREA */
.chat-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: var(--bg); -webkit-overflow-scrolling: touch; }
.chat-main::-webkit-scrollbar { width: 4px; }
.chat-main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* INPUT */
.dock { flex: 0 0 auto; background: var(--glass); backdrop-filter: blur(25px); border-top: 1px solid var(--border); padding: 14px 18px; padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
.input-row { max-width: 800px; margin: 0 auto; background: var(--s1); border: 1px solid var(--border); border-radius: 22px; display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 12px; }
#msg { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 16px; resize: none; min-height: 24px; max-height: 150px; padding: 10px 0; line-height: 1.5; font-family: inherit; }
#sendBtn { width: 44px; height: 44px; border-radius: 15px; border: none; background: var(--deep); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.3s var(--ease); }
#sendBtn.active { opacity: 1; }

/* SIDEBAR - CHATGPT STYLE */
.sb { 
  position: fixed; top: 0; left: 0; bottom: 0; width: 310px; 
  background: #0d0d0f; border-right: 1px solid var(--border); z-index: 500; 
  transform: translateX(-100%); transition: transform 0.4s var(--ease); 
  display: flex; flex-direction: column;
}
.sb.open { transform: translateX(0); box-shadow: 25px 0 100px rgba(0,0,0,0.9); }
.sb-header { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.search-box { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; padding: 8px 12px; gap: 10px; }
.search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; flex: 1; }
.search-box svg { color: var(--muted); }

.sb-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 2px; }
.history-section { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 15px 10px 8px; }
.sb-item { 
  display: flex; align-items: center; gap: 12px; padding: 12px 14px; 
  border-radius: 12px; color: var(--sub); font-size: 14px; cursor: pointer; 
  transition: 0.2s; position: relative;
}
.sb-item:hover { background: var(--s1); color: var(--text); }
.sb-item.active { background: rgba(124,58,237,0.12); color: var(--accent); }
.sb-item-icon { color: var(--muted); flex-shrink: 0; }
.sb-item.active .sb-item-icon { color: var(--accent); }
.del-chat { opacity: 0; transition: 0.2s; background: none; border: none; color: var(--muted); cursor: pointer; }
.sb-item:hover .del-chat { opacity: 1; }

.sb-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.user-pill { display: flex; align-items: center; gap: 10px; color: var(--sub); font-size: 14px; }
.user-avatar { width: 32px; height: 32px; background: var(--s2); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 450; display: none; backdrop-filter: blur(8px); }
.overlay.open { display: block; }

/* MESSAGES */
.msg-row { margin-bottom: 25px; display: flex; flex-direction: column; animation: slideIn 0.4s var(--ease); }
@keyframes slideIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:none; } }
.bubble { padding: 14px 20px; font-size: 15.5px; line-height: 1.6; border-radius: 20px; max-width: 88%; white-space: pre-wrap; word-break: break-word; }
.bubble.user { align-self: flex-end; background: linear-gradient(135deg, var(--deep), #6d28d9); color: #fff; border-bottom-right-radius: 5px; box-shadow: 0 10px 25px rgba(124,58,237,0.2); }
.bubble.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); border-bottom-left-radius: 5px; }

/* THINKING */
.typing { display: flex; gap: 5px; padding: 12px 18px; background: var(--s1); border-radius: 18px; align-self: flex-start; margin-bottom: 25px; border: 1px solid var(--border); }
.typing span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: tPulse 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tPulse { 0%,100% { transform:scale(0.8); opacity:0.3; } 50% { transform:scale(1.1); opacity:1; } }

#splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-btn" style="width:70px; height:70px; font-size:35px;">⚡</div>
  <p style="margin-top:25px; font-weight:700; letter-spacing:4px; font-size:14px; color:var(--muted)">BOLTOOG AI</p>
</div>

<div id="app-root">
  <div class="overlay" id="overlay"></div>
  
  <aside class="sb" id="sb">
    <div class="sb-header">
      <button class="new-btn" id="newBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchChats" placeholder="Search chats...">
      </div>
    </div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-footer">
      <div class="user-pill">
        <div class="user-avatar">👤</div>
        <span id="userName">User</span>
      </div>
      <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <header class="hdr">
    <div class="hdr-left">
      <button class="logo-btn" id="menuBtn">⚡</button>
      <span class="brand">Boltoog AI</span>
    </div>
    <div id="activeTitle" style="color:var(--muted); font-size:13px; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
  </header>

  <main class="chat-main" id="chat">
    <div id="welcome" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:20px;">
      <div style="font-size:60px;">⚡</div>
      <h2 style="font-size:28px; font-weight:700;">How can I help?</h2>
      <p style="color:var(--muted); max-width: 280px; font-size:15px; line-height:1.6;">Your premium AI companion is ready.</p>
    </div>
  </main>

  <footer class="dock">
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Ask anything..."></textarea>
      <button id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const sbClient = supabase.createClient(S_URL, S_KEY);

let session = null, currentId = null, chatHistory = [], allChats = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const sbList = document.getElementById('sbList');
const sidebar = document.getElementById('sb');
const overlay = document.getElementById('overlay');
const searchInput = document.getElementById('searchChats');

// NUCLEAR KEYBOARD FIX
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app-root').style.height = window.visualViewport.height + 'px';
    window.scrollTo(0,0); scrollDown();
  });
}

async function init() {
  const { data } = await sbClient.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  session = data.session;
  document.getElementById('userName').textContent = session.user.user_metadata.full_name || 'User';
  await loadHistory();
  setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${session.access_token}` } });
    const d = await r.json();
    if (r.status === 401) { logout(); return; }
    allChats = d.chats || [];
    renderHistory(allChats);
  } catch(e) {}
}

function renderHistory(chats) {
  sbList.innerHTML = '';
  if (chats.length === 0) {
    sbList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">No chats found</div>';
    return;
  }

  // GROUP BY DATE
  const today = [], yesterday = [], older = [];
  const now = new Date();
  chats.forEach(c => {
    const dt = new Date(c.created_at);
    const diff = (now - dt) / (1000 * 60 * 60 * 24);
    if (diff < 1) today.push(c);
    else if (diff < 2) yesterday.push(c);
    else older.push(c);
  });

  if (today.length) { sbList.innerHTML += '<div class="history-section">Today</div>'; today.forEach(c => addSbItem(c)); }
  if (yesterday.length) { sbList.innerHTML += '<div class="history-section">Yesterday</div>'; yesterday.forEach(c => addSbItem(c)); }
  if (older.length) { sbList.innerHTML += '<div class="history-section">Previous Days</div>'; older.forEach(c => addSbItem(c)); }
}

function addSbItem(c) {
  const el = document.createElement('div');
  el.className = 'sb-item' + (c.id === currentId ? ' active' : '');
  el.innerHTML = `
    <div class="sb-item-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title || 'Untitled Chat'}</span>
    <button class="del-chat" onclick="event.stopPropagation();delChat('${c.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    </button>`;
  el.onclick = () => openChat(c.id);
  sbList.appendChild(el);
}

async function openChat(id) {
  currentId = id; chatHistory = [];
  chatEl.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)">Loading...</div>';
  closeSidebar();
  const r = await fetch(`/api/chat-details?id=${id}`, { headers: { Authorization: `Bearer ${session.access_token}` } });
  const d = await r.json();
  chatEl.innerHTML = '';
  (d.messages || []).forEach(m => {
    addBubble(m.role === 'user' ? 'user' : 'ai', m.content);
    chatHistory.push({ role: m.role, parts: [{ text: m.content }] });
  });
  const c = allChats.find(x => x.id === id);
  if (c) document.getElementById('activeTitle').textContent = c.title;
  scrollDown(); renderHistory(allChats);
}

async function delChat(id) {
  if (!confirm('Delete chat?')) return;
  await fetch(`/api/delete-chat?id=${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${session.access_token}` } });
  if (currentId === id) location.reload(); else loadHistory();
}

function addBubble(type, text) {
  const g = document.createElement('div');
  g.className = 'msg-row';
  g.innerHTML = `<div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(g);
  scrollDown();
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t); scrollDown(); return t;
}

function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

async function logout() { await sbClient.auth.signOut(); window.location.href = '/login'; }

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  if (document.getElementById('welcome')) document.getElementById('welcome').remove();
  addBubble('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('active');
  busy = true;
  const dot = showTyping();
  msgEl.focus(); // KEYBOARD LOCK

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: chatHistory, chatId: currentId })
    });
    const d = await r.json();
    dot.remove();
    if (r.status === 401) { logout(); return; }
    if (d.response) {
      addBubble('ai', d.response);
      chatHistory.push({ role: 'user', parts: [{ text: val }] });
      chatHistory.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currentId) { currentId = d.chatId; loadHistory(); }
    } else {
      alert('AI ERROR: ' + d.error);
    }
  } catch (e) { dot.remove(); addBubble('ai', 'Error.'); } finally { busy = false; scrollDown(); msgEl.focus(); }
}

msgEl.oninput = () => { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 150) + 'px'; sendBtn.classList.toggle('active', msgEl.value.trim().length > 0); };
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

sendBtn.onmousedown = (e) => e.preventDefault();
sendBtn.onclick = send;

searchInput.oninput = () => {
  const q = searchInput.value.toLowerCase();
  const filtered = allChats.filter(c => (c.title||'').toLowerCase().includes(q));
  renderHistory(filtered);
};

document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('open'); overlay.classList.add('open'); };
document.getElementById('newBtn').onclick = () => { location.reload(); };
document.getElementById('logoutBtn').onclick = logout;
overlay.onclick = closeSidebar;
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

init();
</script>
</body>
</html>
