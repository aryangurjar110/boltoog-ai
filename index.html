<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Boltoog AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #09090b; --s1: #18181b; --s2: #27272a;
  --accent: #a78bfa; --deep: #7c3aed;
  --text: #fafafa; --muted: #71717a; --sub: #a1a1aa;
  --border: rgba(255,255,255,0.07);
  --glass: rgba(9,9,11,0.92);
  --ease: cubic-bezier(.16, 1, .3, 1);
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow: hidden; /* Prevent body scroll */
  position: fixed; /* Prevent bounce */
}

/* THE CONTAINER THAT LOCKS EVERYTHING */
#app-container {
  display: flex;
  flex-direction: column;
  height: 100%; /* Respects visualViewport on modern mobile */
  width: 100%;
  overflow: hidden;
}

/* FIXED HEADER */
.hdr {
  flex: 0 0 60px;
  padding-top: env(safe-area-inset-top, 0px);
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding-left: 16px; padding-right: 16px;
  z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.logo-box {
  width: 34px; height: 34px; background: linear-gradient(135deg, var(--deep), #6d28d9);
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 4px 12px rgba(124,58,237,0.3);
}
.brand { font-size: 16px; font-weight: 700; color: #fff; }

/* SCROLLABLE MIDDLE SECTION */
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex; flex-direction: column;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
}
.chat-scroll::-webkit-scrollbar { width: 4px; }
.chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* THE WELCOME BOX (stays centered in middle) */
.welcome {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 15px; opacity: 0.8; padding-bottom: 40px;
}

/* FIXED INPUT DOCK */
.dock {
  flex: 0 0 auto;
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.input-wrap {
  max-width: 700px; margin: 0 auto;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 16px; display: flex; align-items: flex-end;
  padding: 6px 6px 6px 14px; gap: 10px;
}
#msg {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 16px; /* 16px avoids iOS zoom */
  resize: none; min-height: 24px; max-height: 120px;
  padding: 8px 0; line-height: 1.5; font-family: inherit;
}
#sendBtn {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--deep); color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0.3; transition: 0.2s;
}
#sendBtn.active { opacity: 1; transform: scale(1); }
#sendBtn:active { transform: scale(0.92); }

/* SIDEBAR */
.sb {
  position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
  background: #0d0d0f; border-right: 1px solid var(--border);
  z-index: 500; transform: translateX(-100%);
  transition: transform 0.3s var(--ease);
}
.sb.open { transform: translateX(0); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 450; display: none; backdrop-filter: blur(4px); }
.overlay.open { display: block; }

/* MESSAGES */
.msg { margin-bottom: 20px; display: flex; flex-direction: column; animation: fUp 0.3s; }
@keyframes fUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.msg-lbl { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
.bubble { padding: 12px 16px; font-size: 15px; line-height: 1.6; border-radius: 18px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
.bubble.user { align-self: flex-end; background: var(--deep); color: #fff; border-bottom-right-radius: 4px; }
.bubble.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

/* THINKING */
.think { display: flex; gap: 4px; padding: 10px 14px; background: var(--s1); border-radius: 15px; align-self: flex-start; margin-bottom: 20px; }
.think span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: dotP 1.4s infinite; }
.think span:nth-child(2) { animation-delay: 0.2s; }
.think span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotP { 0%,100% { transform:scale(0.7); opacity:0.3; } 50% { transform:scale(1.1); opacity:1; } }

#splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-box" style="width:60px; height:60px; font-size:30px;">⚡</div>
  <p style="color:var(--muted); font-size:12px; margin-top:20px; letter-spacing:2px;">BOLTOOG AI</p>
</div>

<div id="app-container">
  <div class="overlay" id="overlay"></div>
  
  <header class="hdr">
    <div class="hdr-left">
      <button class="logo-box" id="menuBtn" style="border:none; cursor:pointer;">⚡</button>
      <span class="brand">Boltoog AI</span>
    </div>
    <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <main class="chat-scroll" id="chat">
    <div class="welcome" id="welcome">
      <div style="font-size:50px;">⚡</div>
      <h2 style="font-size:26px;">What's on your mind?</h2>
      <p style="color:var(--muted); max-width: 250px;">I'm your personal AI. Ask me anything and I'll help you out!</p>
    </div>
  </main>

  <footer class="dock">
    <div class="input-wrap">
      <textarea id="msg" rows="1" placeholder="Type a message..."></textarea>
      <button id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tbdcwlwxqsfogrgyxjwx.supabase.co';
const S_KEY = 'sb_publishable_il30olEoujJPa6BLrnV-bw_Jr6GruEs';
const sb = supabase.createClient(S_URL, S_KEY);

let session = null, currentId = null, chatHistory = [], busy = false;

const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const splash = document.getElementById('splash');

// KEYBOARD HANDLING
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app-container').style.height = window.visualViewport.height + 'px';
    window.scrollTo(0,0);
    scrollDown();
  });
}

async function start() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  session = data.session;
  splash.style.display = 'none';
}

function addBubble(type, text) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="msg-lbl">${type==='user'?'You':'Boltoog'}</div><div class="bubble ${type}">${text}</div>`;
  chatEl.appendChild(div);
  scrollDown();
}

function showThink() {
  const t = document.createElement('div');
  t.className = 'think';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  scrollDown();
  return t;
}

function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

async function send() {
  const val = msgEl.value.trim();
  if (!val || busy) return;
  
  if (document.getElementById('welcome')) document.getElementById('welcome').remove();
  
  addBubble('user', val);
  msgEl.value = ''; msgEl.style.height = 'auto';
  sendBtn.classList.remove('active');
  busy = true;
  const dot = showThink();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: val, history: chatHistory, chatId: currentId })
    });
    const d = await r.json();
    dot.remove();

    if (r.status === 401) { alert('Session expired.'); window.location.href='/login'; return; }

    if (d.response) {
      addBubble('ai', d.response);
      chatHistory.push({ role: 'user', parts: [{ text: val }] });
      chatHistory.push({ role: 'model', parts: [{ text: d.response }] });
      if (!currentId) currentId = d.chatId;
    } else {
      alert('AI Error: ' + (d.details || d.error));
      addBubble('ai', 'Something went wrong. Check the alert box for details.');
    }
  } catch (e) {
    dot.remove();
    addBubble('ai', 'Network error. Please try again.');
  } finally {
    busy = false; scrollDown();
  }
}

msgEl.oninput = () => {
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
  sendBtn.classList.toggle('active', msgEl.value.trim().length > 0);
};
msgEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
sendBtn.onclick = send;
document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); window.location.href='/login'; };

start();
</script>
</body>
</html>
